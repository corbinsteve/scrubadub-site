server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location /robots.txt {
        add_header Content-Type text/plain;
        try_files $uri =404;
    }

    location /sitemap.xml {
        add_header Content-Type application/xml;
        try_files $uri =404;
    }
}
